name: schemaintern

services:
  postgres:
    image: postgres:16-alpine
    expose: [5432]
    env_file: .env.prod
    environment:
      POSTGRES_DB: schemaintern
      POSTGRES_USER: schemaintern
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres-init:/docker-entrypoint-initdb.d
      - ./test-databases:/test-databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemaintern"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
      target: prod
    expose: [8100]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8100"]
    restart: always

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    expose: [3000]
    depends_on: [backend]
    restart: always

  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [backend, frontend]
    restart: always

volumes:
  pgdata:
