# Global settings
global:
  environment: development

# Backend configuration
backend:
  name: backend
  image:
    repository: upl/backend
    tag: latest
    pullPolicy: Always
  replicas: 2
  port: 8100
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 15
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
    startup:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 5
  env:
    APP_NAME: "UPL Backend"
    APP_VERSION: "0.1.0"
    ENVIRONMENT: "development"
    DEBUG: "false"
    LOG_LEVEL: "INFO"
    REDIS_URL: "redis://redis:6379/0"
    QDRANT_URL: "http://qdrant:6333"
    CORS_ORIGINS: "http://localhost:3000"

# Service configuration
service:
  name: backend
  type: ClusterIP
  port: 8100

# ConfigMap data
config:
  APP_NAME: "UPL Backend"
  APP_VERSION: "0.1.0"
  ENVIRONMENT: "development"
  LOG_LEVEL: "INFO"
