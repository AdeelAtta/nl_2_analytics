global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - prometheus-alerts.yml

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:8100"]
    metrics_path: /metrics

  - job_name: "frontend"
    static_configs:
      - targets: ["frontend:3000"]
    metrics_path: /api/v1/health/live

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
