version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: schemaintern
      POSTGRES_USER: schemaintern
      POSTGRES_PASSWORD: schemaintern_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemaintern"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=6553kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  pgbouncer:
    image: edoburu/pgbouncer:1.22
    ports: ["6432:6432"]
    environment:
      DB_USER: schemaintern
      DB_PASSWORD: schemaintern_dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: schemaintern
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pgdata:
