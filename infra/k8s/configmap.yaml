apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: openquery
  labels:
    app: backend
data:
  APP_NAME: "UPL Backend"
  APP_VERSION: "0.1.0"
  ENVIRONMENT: "development"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  CORS_ORIGINS: "http://localhost:3000"
  OTEL_ENDPOINT: "http://otel-collector:4318"
