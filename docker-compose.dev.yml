name: schemaintern-dev

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-upl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres-init:/docker-entrypoint-initdb.d
      - ./test-databases:/test-databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
      target: dev
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/upl
      POSTGRES_DSN_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/upl
      JWT_SECRET: dev-jwt-secret-change-in-production
      ENVIRONMENT: development
      DEBUG: "true"
    volumes:
      - ./backend:/app
    # Prevent uvicorn from reloading on .pyc / __pycache__ changes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload --reload-exclude "*.pyc" --reload-exclude "__pycache__/*"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
